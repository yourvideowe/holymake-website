<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>後台管理 | Holy make 吼莉行銷</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;1,400&family=Noto+Serif+TC:wght@400;600&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
:root{
--orange:#E07030;--orange-lt:#F09050;--brown:#A05828;--cream:#F5F0E8;--off-white:#FAF8F4;--dark:#2C1A0A;--mid:#6B4423;--green:#4CAF50;--red:#E53935}

  /* 全域手機優化 */
  html{-webkit-text-size-adjust:100%;overflow-x:hidden}
  body{overflow-x:hidden;-webkit-tap-highlight-color:transparent}
  input,select,textarea{font-size:16px!important} /* 防止 iOS zoom */
  button,a{-webkit-tap-highlight-color:transparent;touch-action:manipulation}
  img{max-width:100%;height:auto}

*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{background:#1A0E06;color:#fff;font-family:'DM Sans','Noto Serif TC',sans-serif;min-height:100vh}

/* LOGIN */
.login-wrap{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px}
.login-box{background:rgba(245,240,232,.06);border:1px solid rgba(224,112,48,.2);border-radius:20px;padding:48px 40px;width:100%;max-width:380px;text-align:center}
.login-logo{font-family:'Playfair Display',serif;font-style:italic;font-size:28px;color:var(--orange);margin-bottom:8px}
.login-sub{font-size:12px;color:rgba(255,255,255,.4);letter-spacing:.12em;margin-bottom:36px}
.login-label{font-size:12px;color:rgba(255,255,255,.5);text-align:left;margin-bottom:6px;display:block;letter-spacing:.06em}
.login-input{width:100%;background:rgba(255,255,255,.06);border:1px solid rgba(224,112,48,.2);border-radius:10px;padding:12px 16px;color:#fff;font-size:15px;font-family:inherit;outline:none;transition:.2s;margin-bottom:16px}
.login-input:focus{border-color:var(--orange);background:rgba(224,112,48,.08)}
.login-btn{width:100%;background:var(--orange);color:#fff;padding:13px;border-radius:100px;border:none;font-size:15px;font-weight:500;cursor:pointer;font-family:inherit;letter-spacing:.04em;transition:all .2s;margin-top:8px}
.login-btn:hover{background:var(--brown);transform:translateY(-1px)}
.login-err{color:#ff6b6b;font-size:13px;margin-top:12px;display:none}

/* ADMIN LAYOUT */
.admin-wrap{display:none;min-height:100vh;flex-direction:column}
.admin-header{background:rgba(245,240,232,.06);border-bottom:1px solid rgba(224,112,48,.15);padding:0 24px;display:flex;align-items:center;justify-content:space-between;height:60px;position:sticky;top:0;z-index:100;backdrop-filter:blur(10px)}
.admin-logo{font-family:'Playfair Display',serif;font-style:italic;font-size:18px;color:var(--orange)}
.admin-nav{display:flex;gap:4px}
.admin-nav-btn{background:none;border:none;color:rgba(255,255,255,.5);padding:8px 16px;border-radius:8px;cursor:pointer;font-size:13px;font-family:inherit;transition:.2s}
.admin-nav-btn.active,.admin-nav-btn:hover{background:rgba(224,112,48,.15);color:var(--orange-lt)}
.logout-btn{background:none;border:1px solid rgba(255,255,255,.2);color:rgba(255,255,255,.5);padding:6px 14px;border-radius:100px;cursor:pointer;font-size:12px;font-family:inherit;transition:.2s}
.logout-btn:hover{border-color:rgba(255,255,255,.4);color:#fff}
.admin-body{flex:1;padding:32px 24px;max-width:960px;width:100%;margin:0 auto}

/* TABS */
.tab-panel{display:none}
.tab-panel.active{display:block}

/* STAT CARDS */
.stats{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:14px;margin-bottom:32px}
.stat-card{background:rgba(245,240,232,.05);border:1px solid rgba(224,112,48,.15);border-radius:14px;padding:20px}
.stat-num{font-size:32px;font-weight:600;color:var(--orange);font-family:'Playfair Display',serif}
.stat-label{font-size:12px;color:rgba(255,255,255,.4);margin-top:4px;letter-spacing:.06em}
.section-title{font-family:'Noto Serif TC',serif;font-size:20px;font-weight:600;color:#fff;margin-bottom:20px}

/* ARTICLE LIST */
.article-list{display:flex;flex-direction:column;gap:12px;margin-bottom:28px}
.article-row{background:rgba(245,240,232,.05);border:1px solid rgba(224,112,48,.12);border-radius:12px;padding:16px 20px;display:flex;align-items:center;gap:16px;flex-wrap:wrap}
.article-row-info{flex:1;min-width:0}
.article-row-title{font-family:'Noto Serif TC',serif;font-size:15px;font-weight:600;color:#fff;margin-bottom:4px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.article-row-meta{font-size:12px;color:rgba(255,255,255,.4);display:flex;gap:12px}
.article-row-cat{color:var(--orange-lt)}
.article-row-actions{display:flex;gap:8px;flex-shrink:0}
.btn-view{background:rgba(224,112,48,.15);color:var(--orange-lt);border:none;padding:7px 14px;border-radius:8px;cursor:pointer;font-size:12px;font-family:inherit;text-decoration:none;display:inline-block;transition:.2s}
.btn-view:hover{background:rgba(224,112,48,.25)}
.btn-del{background:rgba(229,57,53,.1);color:#ff6b6b;border:1px solid rgba(229,57,53,.2);padding:7px 14px;border-radius:8px;cursor:pointer;font-size:12px;font-family:inherit;transition:.2s}
.btn-del:hover{background:rgba(229,57,53,.2)}

/* FORM */
.form-card{background:rgba(245,240,232,.05);border:1px solid rgba(224,112,48,.15);border-radius:16px;padding:28px}
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:16px}
.form-group{display:flex;flex-direction:column;gap:6px}
.form-group.full{grid-column:1/-1}
label{font-size:12px;color:rgba(255,255,255,.5);letter-spacing:.06em}
input,select,textarea{background:rgba(255,255,255,.06);border:1px solid rgba(224,112,48,.2);border-radius:10px;padding:11px 14px;color:#fff;font-size:14px;font-family:inherit;outline:none;transition:.2s;resize:vertical}
input:focus,select:focus,textarea:focus{border-color:var(--orange);background:rgba(224,112,48,.08)}
select option{background:#2C1A0A;color:#fff}
.btn-submit{background:var(--orange);color:#fff;padding:12px 28px;border-radius:100px;border:none;font-size:14px;font-weight:500;cursor:pointer;font-family:inherit;letter-spacing:.04em;transition:.2s;margin-top:8px}
.btn-submit:hover{background:var(--brown)}
.toast{position:fixed;bottom:28px;right:24px;background:var(--green);color:#fff;padding:12px 22px;border-radius:100px;font-size:13px;z-index:999;transform:translateY(80px);opacity:0;transition:.4s;pointer-events:none}
.toast.show{transform:translateY(0);opacity:1}
.toast.err{background:var(--red)}
.divider{height:1px;background:rgba(224,112,48,.12);margin:28px 0}

/* RESPONSIVE */
@media(max-width:560px){.form-grid{grid-template-columns:1fr}}

/* ═══ RWD ═══ */
@media(max-width:768px){
  .admin-header{padding:0 16px}
  .admin-logo{font-size:15px}
  .admin-nav{gap:2px}
  .admin-nav-btn{padding:6px 10px;font-size:12px}
  .logout-btn{padding:5px 10px;font-size:11px}
  .admin-body{padding:20px 16px}

  .stats{grid-template-columns:repeat(2,1fr);gap:10px}
  .stat-card{padding:16px}
  .stat-num{font-size:26px}

  .article-row{flex-direction:column;align-items:flex-start;gap:10px}
  .article-row-title{white-space:normal}
  .article-row-actions{width:100%;display:flex;gap:8px}
  .btn-view,.btn-del{flex:1;text-align:center;padding:9px 12px}

  .form-card{padding:20px 16px}
  .form-grid{grid-template-columns:1fr}
  .form-group.full{grid-column:1}

  .login-box{padding:36px 24px}
}
@media(max-width:480px){
  .admin-nav-btn{font-size:11px;padding:5px 8px}
}

</style>

  } catch(e) { return fallback; }
}

<script>
// === 密碼設定（可修改）===
const ADMIN_PASSWORD = 'holymake2025';

function doLogin() {
  const pw = document.getElementById('pwInput').value;
  if (pw === ADMIN_PASSWORD) {
    sessionStorage.setItem('hm_admin', '1');
    document.getElementById('loginWrap').style.display = 'none';
    document.getElementById('adminWrap').style.display = 'flex';
    initAdmin();
  } else {
    document.getElementById('loginErr').style.display = 'block';
    document.getElementById('pwInput').value = '';
  }
}

function doLogout() {
  sessionStorage.removeItem('hm_admin');
  location.reload();
}

// Auto-login if session active
if (sessionStorage.getItem('hm_admin') === '1') {
  document.getElementById('loginWrap').style.display = 'none';
  document.getElementById('adminWrap').style.display = 'flex';
  initAdmin();
}

function switchPanel(id) {
  document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
  document.getElementById('panel-' + id).classList.add('active');
  document.querySelectorAll('.admin-nav-btn').forEach((b,i) => {
    b.classList.toggle('active', ['overview','articles','newArticle'][i] === id);
  });
  if (id === 'articles') renderArticleList();
  if (id === 'overview') renderStats();
}

function initAdmin() {
  // Set default date
  document.getElementById('f_date').value = new Date().toISOString().split('T')[0];
  renderStats();
}

function renderStats() {
  const articles = loadData('articles', SITE_DATA.articles);
  const cats = new Set(articles.map(a => a.category)).size;
  document.getElementById('statsArea').innerHTML = `
    <div class="stat-card"><div class="stat-num">${articles.length}</div><div class="stat-label">文章總數</div></div>
    <div class="stat-card"><div class="stat-num">${cats}</div><div class="stat-label">文章分類</div></div>
    <div class="stat-card"><div class="stat-num">1</div><div class="stat-label">LINE 官方帳號</div></div>
    <div class="stat-card"><div class="stat-num">4</div><div class="stat-label">服務方案</div></div>
  `;
}

function renderArticleList() {
  const articles = loadData('articles', SITE_DATA.articles);
  const list = document.getElementById('articleList');
  if (!articles.length) {
    list.innerHTML = '<p style="color:rgba(255,255,255,.3);font-size:14px">目前還沒有文章</p>';
    return;
  }
  list.innerHTML = articles.map(a => `
    <div class="article-row">
      <div class="article-row-info">
        <div class="article-row-title">${a.title}</div>
        <div class="article-row-meta">
          <span class="article-row-cat">${a.category}</span>
          <span>${a.date}</span>
          <span style="opacity:.5">${a.slug}</span>
        </div>
      </div>
      <div class="article-row-actions">
        <a href="../blog/article.html#${a.slug}" target="_blank" class="btn-view">預覽</a>
        <button class="btn-del" onclick="deleteArticle(${a.id})">刪除</button>
      </div>
    </div>
  `).join('');
}

function deleteArticle(id) {
  if (!confirm('確定要刪除這篇文章嗎？此動作無法復原。')) return;
  let articles = loadData('articles', SITE_DATA.articles);
  articles = articles.filter(a => a.id !== id);
  saveData('articles', articles);
  renderArticleList();
  showToast('文章已刪除');
}

function addArticle() {
  const title = document.getElementById('f_title').value.trim();
  const category = document.getElementById('f_category').value;
  const slug = document.getElementById('f_slug').value.trim().toLowerCase().replace(/\s+/g,'-');
  const date = document.getElementById('f_date').value;
  const tagsRaw = document.getElementById('f_tags').value;
  const excerpt = document.getElementById('f_excerpt').value.trim();
  const content = document.getElementById('f_content').value.trim();

  if (!title || !slug || !excerpt || !content) {
    showToast('請填寫所有必填欄位', true);
    return;
  }

  const articles = loadData('articles', SITE_DATA.articles);
  if (articles.find(a => a.slug === slug)) {
    showToast('此 slug 已存在，請更換', true);
    return;
  }

  const newId = Math.max(...articles.map(a => a.id), 0) + 1;
  const tags = tagsRaw ? tagsRaw.split(',').map(t => t.trim()).filter(Boolean) : [];

  articles.unshift({ id: newId, title, category, slug, date: date || new Date().toISOString().split('T')[0], tags, excerpt, content });
  saveData('articles', articles);
  clearForm();
  showToast('✓ 文章發布成功！');
  setTimeout(() => switchPanel('articles'), 1200);
}

function clearForm() {
  ['f_title','f_slug','f_tags','f_excerpt','f_content'].forEach(id => document.getElementById(id).value = '');
  document.getElementById('f_date').value = new Date().toISOString().split('T')[0];
}

function showToast(msg, err=false) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.toggle('err', err);
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 3000);
}

// Auto slug from title
document.addEventListener('DOMContentLoaded', () => {
  if (document.getElementById('f_title')) {
    // listen to title changes
  }
});
</script>
</body>
