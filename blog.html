<script>
let currentCategory = 'all';

function getCategories(articles) {
  const cats = ['all', ...new Set(articles.map(a => a.category))];
  return cats;
}

function renderTags(articles) {
  const cats = getCategories(articles);
  const wrap = document.getElementById('filterTags');
  wrap.innerHTML = cats.map(c => `
    <span class="filter-tag ${c === currentCategory ? 'active' : ''}" onclick="setCategory('${c}')">
      ${c === 'all' ? '全部' : c}
    </span>
  `).join('');
}

function setCategory(cat) {
  currentCategory = cat;
  filterArticles();
}

function filterArticles() {
  const articles = loadData('articles', SITE_DATA.articles);
  const q = document.getElementById('searchInput').value.toLowerCase();
  let filtered = articles;
  if (currentCategory !== 'all') filtered = filtered.filter(a => a.category === currentCategory);
  if (q) filtered = filtered.filter(a => a.title.toLowerCase().includes(q) || a.excerpt.toLowerCase().includes(q) || (a.tags||[]).some(t=>t.toLowerCase().includes(q)));
  renderTags(articles);
  renderGrid(filtered);
}

function renderGrid(articles) {
  const grid = document.getElementById('blogGrid');
  if (!articles.length) {
    grid.innerHTML = `<div class="empty-state" style="grid-column:1/-1">
      <svg width="48" height="48" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24"><path d="M9 12h6M9 16h6M7 4H4a1 1 0 00-1 1v14a1 1 0 001 1h16a1 1 0 001-1V5a1 1 0 00-1-1h-3"/><path d="M9 4v2a1 1 0 001 1h4a1 1 0 001-1V4"/></svg>
      <p>找不到相關文章</p></div>`;
    return;
  }
  grid.innerHTML = articles.map(a => `
    <a href="blog/article.html#${a.slug}" class="blog-card">
      <span class="blog-tag">${a.category}</span>
      <div class="blog-title">${a.title}</div>
      <div class="blog-excerpt">${a.excerpt}</div>
      <span class="blog-date">${a.date}</span>
    </a>
  `).join('');
}

filterArticles();
</script>
